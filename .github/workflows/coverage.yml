name: Code Coverage

on:
  pull_request:
    branches: [dev, master, main]
  workflow_dispatch:

jobs:
  coverage:
    uses: OpenVoiceOS/gh-automations/.github/workflows/coverage.yml@dev
    with:
      python_version: '3.11'
      coverage_source: 'ovos_hierarchical_knn_pipeline'
      test_path: 'tests/'
      install_extras: 'test'
      min_coverage: 0
